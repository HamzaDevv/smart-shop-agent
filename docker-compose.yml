# =============================================================
#  Dukaan Sahaayak — Docker Compose
#  Usage:
#    1. Copy .env.docker to .env.docker and fill in API keys
#    2. docker compose up --build -d
#    3. Open http://localhost:3000
# =============================================================

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: dukaan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dukaan_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-smartinventory}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dukaan-net

  # ── BillDeck Backend (CRUD + AI Proxy) ─────────────────────
  backend:
    build:
      context: ./BillDeck-backend
      dockerfile: Dockerfile
    container_name: dukaan-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:dukaan_secret_2024@db:5432/smartinventory}
      AI_BACKEND_URL: ${AI_BACKEND_URL:-http://ai-backend:8001}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CORS_ORIGINS: "http://localhost:3000,http://frontend:80"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dukaan-net

  # ── AI Backend (LangGraph Agents) ──────────────────────────
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: dukaan-ai
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:dukaan_secret_2024@db:5432/smartinventory}
      V_DATABASE_URL: ${V_DATABASE_URL:-postgresql://postgres:dukaan_secret_2024@db:5432/vector_db}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dukaan-net

  # ── React Frontend (Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./DukaanSahaayak-client
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
    container_name: dukaan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - dukaan-net

# ── Volumes ──────────────────────────────────────────────────
volumes:
  pgdata:

# ── Network ──────────────────────────────────────────────────
networks:
  dukaan-net:
    driver: bridge
